<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DemoMart - お問い合わせ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>DemoMart デモストア</h1>
  </header>
  <nav aria-label="メイン">
    <a href="/index.html">トップ</a>
    <a href="/products.html">商品一覧</a>
  </nav>
  <main>
    <h2>お問い合わせ</h2>
    <section>
      <form action="/contact/send" method="post">
        <label for="name">お名前（必須）</label>
        <input type="text" id="name" name="name" placeholder="山田 太郎" required maxlength="50">
        <label for="contact-email">メールアドレス（必須）</label>
        <input type="email" id="contact-email" name="email" placeholder="user@example.com" required>
        <label for="category">お問い合わせ種別</label>
        <select id="category" name="category">
          <option value="order">注文について</option>
          <option value="product">商品について</option>
          <option value="other">その他</option>
        </select>
        <label for="message">お問い合わせ内容（必須・500文字まで）</label>
        <textarea id="message" name="message" rows="5" required maxlength="500"
                  placeholder="お問い合わせ内容をご記入ください"></textarea>
        <button type="submit">送信する</button>
      </form>
    </section>
  </main>
  <footer>
    <small>DemoMart — お問い合わせ（必須バリデーション実測デモ）</small>
  </footer>
</body>
</html>
