        <!-- ===== トレーサビリティマトリクスビュー ===== -->
        <section class="view" id="view-traceability">
          <style>
            .traceability-header {
              display: flex;
              justify-content: space-between;
              align-items: center;
              gap: 12px;
              margin-bottom: 16px;
            }
            .traceability-header h2 {
              margin: 0;
              font-size: 18px;
            }
            #traceability-summary {
              font-size: 13px;
              color: var(--text-muted, #555);
            }
            #traceability-coverage-bar {
              display: flex;
              height: 16px;
              border-radius: 8px;
              overflow: hidden;
              margin-bottom: 16px;
              background: var(--border, #e0e0e0);
            }
            .coverage-bar-covered {
              background: #27ae60;
              transition: width 0.3s ease;
            }
            .coverage-bar-partial {
              background: #e67e22;
              transition: width 0.3s ease;
            }
            .coverage-bar-uncovered {
              background: #e74c3c;
              transition: width 0.3s ease;
            }
            .traceability-table {
              width: 100%;
              border-collapse: collapse;
              font-size: 13px;
            }
            .traceability-table th,
            .traceability-table td {
              padding: 8px 10px;
              border-bottom: 1px solid var(--border, #e0e0e0);
              text-align: left;
              vertical-align: middle;
            }
            .traceability-table th {
              background: var(--surface-muted, #f5f5f5);
              font-weight: 600;
              color: var(--text-muted, #555);
              white-space: nowrap;
            }
            .traceability-table td.url-cell {
              font-size: 11px;
              color: var(--text-muted, #777);
              word-break: break-all;
              max-width: 200px;
            }
            .coverage-badge {
              display: inline-block;
              padding: 2px 8px;
              border-radius: 12px;
              font-size: 11px;
              font-weight: 600;
              color: #fff;
              white-space: nowrap;
            }
            .coverage-covered  { background: #27ae60; }
            .coverage-partial  { background: #e67e22; }
            .coverage-uncovered { background: #e74c3c; }
            .test-ids-cell {
              font-size: 11px;
              color: var(--text-muted, #555);
            }
            #traceability-loading {
              padding: 32px;
              text-align: center;
              color: var(--text-muted, #888);
              font-size: 14px;
            }
          </style>

          <div class="traceability-header">
            <h2>トレーサビリティマトリクス</h2>
            <div id="traceability-summary">
              <!-- カバレッジ率・件数サマリー（JS で更新） -->
            </div>
          </div>

          <!-- カバレッジ割合バー（JS で描画） -->
          <div id="traceability-coverage-bar"></div>

          <!-- マトリクステーブル -->
          <table class="traceability-table">
            <thead>
              <tr>
                <th>要件 ID</th>
                <th>要件タイトル</th>
                <th>URL</th>
                <th>テストケース</th>
                <th>カバレッジ</th>
              </tr>
            </thead>
            <tbody id="traceability-tbody">
              <!-- JS で描画 -->
            </tbody>
          </table>

          <div id="traceability-loading">読み込み中...</div>
        </section>
