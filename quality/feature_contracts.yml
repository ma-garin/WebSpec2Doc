{
  "version": 1,
  "features": [
    {
      "feature_id": "discover",
      "name": "URL解析 / 画面発見",
      "risk_level": "critical",
      "status": "implemented",
      "ui_files": ["templates/partials/view-generate.html", "static/js/wizard.js"],
      "route_files": ["web/routes/discover.py"],
      "core_files": ["src/crawler/page_crawler.py"],
      "symbols": ["discover_pages"],
      "outputs": ["screen candidates", "status messages"],
      "persistence": [],
      "failure_modes": ["invalid_url", "timeout", "login_wall", "restricted_url"],
      "required_tests": ["happy_path", "error_path", "evidence"]
    },
    {
      "feature_id": "crawl",
      "name": "クロール / レポート生成",
      "risk_level": "critical",
      "status": "implemented",
      "ui_files": ["templates/partials/view-generate.html", "static/js/execution.js", "static/js/results.js", "static/js/ui-states.js"],
      "route_files": ["web/routes/crawl.py"],
      "core_files": ["src/crawler/page_crawler.py", "src/crawler/parallel_crawler.py", "src/crawler/politeness.py", "src/crawler/action_explorer.py", "src/crawler/link_extractor.py"],
      "symbols": ["crawl_site", "crawl_urls_parallel", "extract_links_all_scopes", "collect_embedded_frames"],
      "outputs": ["report.html", "report.json", "screenshots", "snapshot", "audit.jsonl"],
      "persistence": ["output/{domain}/", "output/{domain}/snapshots/"],
      "failure_modes": ["login_wall_during_crawl", "restricted_url", "timeout", "cancel", "partial_checkpoint", "robots_disallowed", "rate_limit_backoff", "mutation_blocked", "cross_origin_iframe", "closed_shadow_root"],
      "required_tests": ["happy_path", "error_path", "cancel_path", "checkpoint_path", "evidence"]
    },
    {
      "feature_id": "login",
      "name": "ログイン / セッション",
      "risk_level": "critical",
      "status": "implemented",
      "ui_files": ["templates/partials/view-generate.html", "static/js/wizard.js"],
      "route_files": ["web/routes/login.py"],
      "core_files": ["src/crawler/auto_login.py", "src/analyzer/login_wall.py", "src/crawler/auth_recorder.py", "src/crawler/auth.py"],
      "symbols": ["submit_login_simple", "detect_login_wall", "record_auth_session", "verify_auth_state"],
      "outputs": ["auth.json", "login wall status", "login record status (.login_status.json)"],
      "persistence": ["output/{domain}/auth.json", "output/{domain}/.login_signal", "output/{domain}/.login_status.json"],
      "failure_modes": ["invalid_credentials", "mfa_required", "session_expired", "display_missing", "recorder_timeout", "browser_closed"],
      "required_tests": ["happy_path", "error_path", "session_expiry_path", "evidence", "timeout_path", "cancel_path"]
    },
    {
      "feature_id": "autorun",
      "name": "AutoRun",
      "risk_level": "high",
      "status": "implemented",
      "ui_files": ["templates/partials/view-auto-run.html", "static/js/autorun.js", "static/js/autorun-approval.js", "static/js/view-test-runs.js"],
      "route_files": ["web/routes/auto_run.py"],
      "core_files": ["web/services/spec_ts_generator.py", "web/services/playwright_executor.py"],
      "symbols": [],
      "outputs": ["QA artifacts", "Playwright candidates", "execution logs"],
      "persistence": ["output/{domain}/qa_process/"],
      "failure_modes": ["approval_timeout", "login_wait_timeout", "dependency_missing", "cancel"],
      "required_tests": ["happy_path", "approval_path", "cancel_path", "error_path"]
    },
    {
      "feature_id": "diff_history",
      "name": "差分 / 履歴 / 再クロール",
      "risk_level": "critical",
      "status": "implemented",
      "ui_files": ["static/js/history.js", "static/js/recrawl.js", "static/js/results.js"],
      "route_files": ["web/routes/history.py"],
      "core_files": ["src/diff/snapshot.py", "src/diff/differ.py"],
      "symbols": ["save_snapshot", "compute_diff"],
      "outputs": ["snapshots", "diff_report.html"],
      "persistence": ["output/{domain}/snapshots/"],
      "failure_modes": ["missing_snapshot", "session_expired_false_diff", "snapshot_overwrite"],
      "required_tests": ["happy_path", "breaking_change_path", "error_path", "evidence"]
    },
    {
      "feature_id": "settings",
      "name": "設定",
      "risk_level": "high",
      "status": "implemented",
      "ui_files": ["templates/partials/view-settings.html", "static/js/settings.js"],
      "route_files": ["web/routes/settings.py"],
      "core_files": ["web/env_store.py"],
      "symbols": ["_write_env"],
      "outputs": ["settings state", ".env update"],
      "persistence": [".env"],
      "failure_modes": ["invalid_json", "invalid_type", "unsafe_option_enabled"],
      "required_tests": ["happy_path", "validation_path", "evidence"]
    },
    {
      "feature_id": "usage_roi",
      "name": "ROIダッシュボード / 利用実績",
      "risk_level": "medium",
      "status": "implemented",
      "ui_files": ["templates/partials/view-usage.html"],
      "route_files": ["web/routes/usage.py"],
      "core_files": ["web/services/usage_tracker.py"],
      "symbols": ["record_usage", "summarize_usage"],
      "outputs": ["usage summary", "estimated saved hours"],
      "persistence": ["output/usage_log.jsonl"],
      "failure_modes": ["missing_log", "corrupt_log_line", "invalid_coefficient_env"],
      "required_tests": ["happy_path", "empty_path", "evidence"]
    }
    ,{
      "feature_id": "doc_fusion",
      "name": "文書×実測突合（Doc Fusion）",
      "risk_level": "high",
      "status": "implemented",
      "ui_files": ["templates/partials/view-generate.html", "static/js/wizard.js", "static/js/execution.js", "static/js/results.js", "static/js/doc-fusion.js"],
      "route_files": ["web/routes/crawl.py"],
      "core_files": ["src/ingest/loader.py", "src/ingest/matcher.py", "src/generator/fusion_reporter.py", "src/ingest/llm_extractor.py", "src/analyzer/rule_injector.py", "src/generator/json_reporter.py"],
      "symbols": ["load_reference_documents", "fuse", "save_fusion_outputs", "extract_semantics", "filter_hallucinations", "build_rule_conditions"],
      "outputs": ["doc_fusion.json", "doc_fusion.md", "official_name in report.json", "documented_rules in doc_fusion.json", "document_conditions/test_conditions_detail in report.json"],
      "persistence": ["output/{domain}/doc_fusion.json", "output/{domain}/reference_docs/"],
      "failure_modes": ["unsupported_format", "missing_file", "legacy_binary_format", "no_match", "llm_schema_reject", "hallucinated_quote", "rule_unmatched", "rule_value_unparsable", "upload_rejected", "path_traversal_attempt"],
      "required_tests": ["happy_path", "error_path", "mismatch_detection", "evidence"]
    },
    {
      "feature_id": "exploration_capture",
      "name": "探索セッション記録 / カバレッジヒートマップ",
      "risk_level": "high",
      "status": "implemented",
      "ui_files": ["templates/partials/view-generate.html", "static/js/results.js", "static/js/view-coverage.js"],
      "route_files": ["web/routes/report.py"],
      "core_files": ["src/capture/session_recorder.py", "src/capture/coverage.py", "src/generator/heatmap_reporter.py", "src/generator/html_reporter.py"],
      "symbols": ["SessionRecorder", "compute_exploration_coverage", "propose_charters", "generate_heatmap_html"],
      "outputs": ["sessions/session_*.jsonl", "exploration_coverage.json", "exploration_heatmap.html"],
      "persistence": ["output/{domain}/sessions/"],
      "failure_modes": ["no_inventory", "no_sessions", "browser_closed", "unmatched_footprint", "coverage_file_corrupt"],
      "required_tests": ["happy_path", "error_path", "state_join_key", "evidence"]
    },
    {
      "feature_id": "reverse_assets",
      "name": "リバース（記録セッション→テスト資産の逆生成）",
      "risk_level": "medium",
      "status": "implemented",
      "ui_files": [],
      "route_files": [],
      "core_files": ["src/capture/reverse_generator.py"],
      "symbols": ["generate_recorded_assets", "save_recorded_assets"],
      "outputs": ["recorded_assets.json", "recorded_candidates.json"],
      "persistence": ["output/{domain}/recorded_assets.json", "output/{domain}/recorded_candidates.json"],
      "failure_modes": ["no_sessions", "no_inventory", "no_visit_events"],
      "required_tests": ["happy_path", "error_path", "state_join_key", "evidence"]
    },
    {
      "feature_id": "field_definition_bva",
      "name": "項目定義書＋境界値分析（BVA）テストデータ自動生成",
      "risk_level": "medium",
      "status": "implemented",
      "ui_files": [],
      "route_files": [],
      "core_files": ["src/analyzer/bva.py", "src/main.py"],
      "symbols": ["derive_boundary_cases", "attach_observed_boundary_cases"],
      "outputs": ["spec.xlsx（項目定義書シート・境界値データシート）"],
      "persistence": ["output/{domain}/spec.xlsx"],
      "failure_modes": ["invalid_pattern", "unparsable_range", "no_evidence"],
      "required_tests": ["happy_path", "error_path", "evidence"]
    }
  ]
}
