<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DemoMart - ログイン</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>DemoMart デモストア</h1>
  </header>
  <nav aria-label="メイン">
    <a href="/index.html">トップ</a>
    <a href="/checkout.html">お支払い</a>
  </nav>
  <main>
    <h2>ログイン</h2>
    <section>
      <form action="/login" method="post">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" placeholder="user@example.com"
               required maxlength="100" autocomplete="username">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" placeholder="8文字以上"
               required minlength="8" maxlength="64" autocomplete="current-password">
        <button type="submit">ログイン</button>
      </form>
    </section>
    <p><a href="/checkout.html">ログイン後はお支払いへ進みます</a></p>
  </main>
  <footer>
    <small>DemoMart — ログイン画面（SCREEN_AUTH デモ）</small>
  </footer>
</body>
</html>
