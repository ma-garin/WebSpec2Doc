        <!-- ===== 実行履歴ビュー（種別を問わない一般化・R2-27） ===== -->
        <section class="view" id="view-run-history">
          <div class="rh-toolbar">
            <div class="rh-type-tabs" role="tablist" aria-label="履歴の種別">
              <button type="button" class="rh-type-tab" data-type="crawl" role="tab">解析</button>
              <button type="button" class="rh-type-tab" data-type="autorun" role="tab">AutoRun</button>
              <button type="button" class="rh-type-tab" data-type="comparison" role="tab">現新比較</button>
              <button type="button" class="rh-type-tab" data-type="ux_review" role="tab">UXレビュー</button>
              <button type="button" class="rh-type-tab" data-type="schedule" role="tab">スケジュール</button>
              <button type="button" class="rh-type-tab" data-type="all" role="tab">すべて</button>
            </div>
            <button type="button" id="rh-reload-btn" class="btn-outline-sm">↺ 再読み込み</button>
          </div>

          <div id="rh-container">
            <table class="rh-table">
              <thead>
                <tr>
                  <th>種別</th>
                  <th>サイト</th>
                  <th>日時</th>
                  <th>状態</th>
                  <th>主要数値</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="rh-tbody"></tbody>
            </table>
            <div id="rh-empty" style="display:none">実行履歴がありません。</div>
            <div id="rh-pager" class="pager-wrap"></div>
          </div>
        </section>
