        <!-- ===== 実行履歴ビュー（種別を問わない一般化・R2-27） ===== -->
        <section class="view" id="view-run-history">
          <style>
            .rh-toolbar {
              display: flex;
              gap: 8px;
              align-items: center;
              margin-bottom: 14px;
              flex-wrap: wrap;
            }
            .rh-table {
              width: 100%;
              border-collapse: collapse;
              font-size: 13px;
            }
            .rh-table th, .rh-table td {
              padding: 8px 10px;
              border-bottom: 1px solid var(--border, #e0e0e0);
              text-align: left;
              vertical-align: middle;
            }
            .rh-table th {
              background: var(--surface-muted, #f5f5f5);
              font-weight: 600;
              color: var(--text-muted, #555);
              white-space: nowrap;
            }
            .rh-type-badge {
              display: inline-block;
              padding: 2px 8px;
              border-radius: 12px;
              font-size: 11px;
              font-weight: 700;
              color: #fff;
              white-space: nowrap;
            }
            .rh-type-crawl { background: #2980b9; }
            .rh-type-autorun { background: #8e44ad; }
            .rh-type-comparison { background: #16a085; }
            .rh-type-ux_review { background: #d35400; }
            .rh-status-badge {
              display: inline-block;
              padding: 2px 8px;
              border-radius: 12px;
              font-size: 11px;
              font-weight: 700;
              white-space: nowrap;
            }
            .rh-status-complete { background: #27ae60; color: #fff; }
            .rh-status-failed { background: #c0392b; color: #fff; }
            .rh-status-cancelled { background: #888; color: #fff; }
            .rh-status-running { background: #f39c12; color: #fff; }
            #rh-empty { padding: 32px; text-align: center; color: var(--text-muted, #888); font-size: 14px; }
            /* 種別タブ（.set-tab と同スタイルを流用。実行履歴の種別select→タブ化 R3-16） */
            .rh-type-tabs { display: inline-flex; gap: 4px; padding: 4px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface-soft); flex-wrap: wrap; }
            .rh-type-tab { height: 34px; padding: 0 16px; border: 0; border-radius: 4px; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 700; cursor: pointer; }
            .rh-type-tab.is-active { background: var(--surface); color: var(--primary-dark); box-shadow: inset 0 -2px 0 var(--primary); }
          </style>

          <div class="rh-toolbar">
            <div class="rh-type-tabs" role="tablist" aria-label="履歴の種別">
              <button type="button" class="rh-type-tab" data-type="crawl" role="tab">解析</button>
              <button type="button" class="rh-type-tab" data-type="autorun" role="tab">AutoRun</button>
              <button type="button" class="rh-type-tab" data-type="comparison" role="tab">現新比較</button>
              <button type="button" class="rh-type-tab" data-type="ux_review" role="tab">UXレビュー</button>
              <button type="button" class="rh-type-tab" data-type="all" role="tab">すべて</button>
            </div>
            <button type="button" id="rh-reload-btn" class="btn-outline-sm">↺ 再読み込み</button>
          </div>

          <div id="rh-container">
            <table class="rh-table">
              <thead>
                <tr>
                  <th>種別</th>
                  <th>サイト</th>
                  <th>日時</th>
                  <th>状態</th>
                  <th>主要数値</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="rh-tbody"></tbody>
            </table>
            <div id="rh-empty" style="display:none">実行履歴がありません。</div>
          </div>
        </section>
