<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン — WebSpec2Doc</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}?v={{ _ver }}">
</head>
<body>
<div class="stage">
  <aside class="brand">
    <span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span>
    <div class="logo">
      <span class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
      </span>
      WebSpec2Doc
    </div>
    <div class="pitch">
      <h2>サイトの仕様を、<br>ドキュメントへ。</h2>
      <p>クロールした Web サイトから仕様・テスト観点・成果物を自動生成するワークスペース。</p>
    </div>
  </aside>

  <main class="panel">
    <form class="form" method="post" action="{{ url_for('auth.login_submit') }}" novalidate>
      <h1>ログイン</h1>
      <p class="sub">メールアドレスを入力してワークスペースへ進みます。</p>

      <div class="field {% if error %}err{% endif %}">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" inputmode="email" autocomplete="email"
               placeholder="you@example.com" value="{{ email|e }}" required autofocus>
        {% if error %}
          <p class="msg">{{ error }}</p>
        {% else %}
          <p class="hint">パスワードは不要です。入力したメールで識別します。</p>
        {% endif %}
      </div>

      <button type="submit" class="btn primary">続ける</button>
    </form>
  </main>
</div>
</body>
</html>
