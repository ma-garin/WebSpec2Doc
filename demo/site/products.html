<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DemoMart - 商品一覧</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>DemoMart デモストア</h1>
  </header>
  <nav aria-label="メイン">
    <a href="/index.html">トップ</a>
    <a href="/checkout.html">お支払い</a>
    <a href="/contact.html">お問い合わせ</a>
  </nav>
  <main>
    <h2>商品一覧</h2>
    <section>
      <form action="/products" method="get">
        <label for="q">キーワード検索</label>
        <input type="search" id="q" name="q" placeholder="商品名で検索" maxlength="80">
        <button type="submit">検索</button>
      </form>
    </section>
    <section>
      <h3>デモ商品ラインナップ</h3>
      <ul>
        <li>デモコーヒー豆 200g — ¥1,280 <a href="/checkout.html">購入する</a></li>
        <li>デモマグカップ — ¥980 <a href="/checkout.html">購入する</a></li>
        <li>デモトートバッグ — ¥2,480 <a href="/checkout.html">購入する</a></li>
      </ul>
    </section>
  </main>
  <footer>
    <small>DemoMart — 商品一覧（SCREEN_LIST デモ）</small>
  </footer>
</body>
</html>
