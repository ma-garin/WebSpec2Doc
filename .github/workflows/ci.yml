name: CI

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.runtime/ms-playwright

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        # docs/ 配下・*.md のみの変更なら code=false（重いジョブをスキップ）。
        # push（main への統合）は常に code=true。
        # 注入対策: GitHub コンテキストは env 経由で渡し、run 内では展開しない。
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags --depth=200 origin "$BASE_REF"
          # core.quotepath=false: 日本語ファイル名が \"docs/...\" と引用符付きで
          # 出力されると ^docs/ にマッチせず、docs変更でもE2Eが走ってしまう
          if git -c core.quotepath=false diff --name-only "origin/${BASE_REF}...HEAD" \
              | grep -vE '^docs/|\.md$' | grep -q .; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: lint / type / test / security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src app.py tests web

      - name: Format check (black)
        run: black --check src app.py tests web

      - name: Type check (mypy)
        run: mypy

      - name: Tests + coverage gate (80%) — src AND web
        # web/ を含めることで認証・CSRF・API エンドポイントのカバレッジを計測
        run: |
          pytest tests/ --ignore=tests/e2e -q \
            --cov=src --cov=web \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Security scan (bandit)
        # 中程度以上の深刻度を検出。-q で冗長出力を抑制
        run: |
          pip install --quiet bandit
          bandit -r src web app.py -ll -q

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip install --quiet pip-audit
          pip-audit --requirement requirements.txt

  smoke:
    name: smoke crawl (Playwright CLI)
    runs-on: ubuntu-22.04  # Playwright 1.44 の OS 依存は 24.04 と非互換のため固定
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python scripts/manage_playwright_runtime.py install --with-deps

      - name: Smoke crawl (--compare x2)
        run: |
          python src/main.py --url https://example.com --depth 1 --max-pages 2 --format html,md --compare --output ./_ci_out
          python src/main.py --url https://example.com --depth 1 --max-pages 2 --format html,md --compare --output ./_ci_out
          test -s ./_ci_out/example.com/report.html
          test -s ./_ci_out/example.com/diff_report.html

  e2e-ui:
    name: E2E UI tests (L3 System Test)
    runs-on: ubuntu-22.04  # smoke と OS 統一 (Playwright 1.44 互換)
    # docs/*.md のみの変更ではスキップ。コード変更 or main への push で実行。
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python scripts/manage_playwright_runtime.py install --with-deps

      - name: Run E2E UI tests
        # サーバーは conftest.py の flask_server fixture が自動起動する
        run: |
          pytest tests/e2e/ -v \
            --tb=short \
            --timeout=60 \
            -x
        env:
          WEBSPEC2DOC_E2E_EXTERNAL: "0"

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ github.run_id }}
          path: tests/e2e/screenshots/
          retention-days: 7

      - name: Upload all screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-all-${{ github.run_id }}
          path: tests/e2e/screenshots/
          retention-days: 3

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
