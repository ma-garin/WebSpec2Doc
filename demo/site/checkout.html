<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DemoMart - お支払い・決済</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>DemoMart デモストア</h1>
  </header>
  <nav aria-label="メイン">
    <a href="/index.html">トップ</a>
    <a href="/products.html">商品一覧</a>
  </nav>
  <main>
    <h2>お支払い・決済</h2>
    <section>
      <h3>クレジットカード情報</h3>
      <form action="/payment/confirm" method="post">
        <label for="card-number">カード番号</label>
        <input type="text" id="card-number" name="card_number" placeholder="1111 2222 3333 4444"
               required maxlength="19" pattern="[0-9 ]{13,19}" inputmode="numeric">
        <label for="card-name">カード名義</label>
        <input type="text" id="card-name" name="card_name" placeholder="TARO YAMADA"
               required maxlength="40">
        <label for="expiry">有効期限（MM/YY）</label>
        <input type="text" id="expiry" name="expiry" placeholder="12/28"
               required pattern="(0[1-9]|1[0-2])/[0-9]{2}" maxlength="5">
        <label for="cvc">セキュリティコード</label>
        <input type="text" id="cvc" name="cvc" placeholder="123"
               required pattern="[0-9]{3,4}" maxlength="4" inputmode="numeric">
        <label for="amount">支払金額（円）</label>
        <input type="number" id="amount" name="amount" min="100" max="1000000" value="4980" required>
        <button type="submit">この内容で支払う</button>
      </form>
    </section>
  </main>
  <footer>
    <small>DemoMart — 決済画面（SCREEN_PAYMENT / PII リスク検出デモ）</small>
  </footer>
</body>
</html>
