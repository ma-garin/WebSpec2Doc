name: Spec Drift Detection

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'クロール対象URL (例: https://example.com)'
        required: true
        type: string
  schedule:
    - cron: '0 9 * * 1'  # 毎週月曜 JST 18:00 (UTC 9:00)

jobs:
  detect-drift:
    name: Detect Specification Drift
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Resolve target cache namespace
        id: target
        env:
          TARGET_URL: ${{ inputs.target_url || vars.WEBSPEC_TARGET_URL }}
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "WEBSPEC_TARGET_URL または target_url を設定してください。" >&2
            exit 2
          fi
          target_hash=$(printf '%s' "$TARGET_URL" | sha256sum | cut -c1-16)
          echo "hash=$target_hash" >> "$GITHUB_OUTPUT"

      - name: Restore prior snapshots
        uses: actions/cache/restore@v4
        with:
          path: output/**/snapshots
          key: spec-drift-snapshots-${{ steps.target.outputs.hash }}-${{ github.run_id }}
          restore-keys: |
            spec-drift-snapshots-${{ steps.target.outputs.hash }}-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python scripts/manage_playwright_runtime.py install

      - name: Run spec drift detection
        id: drift
        env:
          TARGET_URL: ${{ inputs.target_url || vars.WEBSPEC_TARGET_URL }}
        run: |
          set +e
          python src/main.py \
            --url "$TARGET_URL" \
            --ci \
            --format json,html
          DRIFT_EXIT_CODE=$?
          echo "DRIFT_EXIT_CODE=$DRIFT_EXIT_CODE" >> "$GITHUB_ENV"
          echo "exit_code=$DRIFT_EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Save current snapshots
        if: env.DRIFT_EXIT_CODE == '0' || env.DRIFT_EXIT_CODE == '1'
        uses: actions/cache/save@v4
        with:
          path: output/**/snapshots
          key: spec-drift-snapshots-${{ steps.target.outputs.hash }}-${{ github.run_id }}

      - name: Notify drift (Slack)
        if: env.DRIFT_EXIT_CODE == '1'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/notify_drift.py output/*/drift_summary.json

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-drift-report-${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: Preserve drift or execution failure exit code
        if: always() && env.DRIFT_EXIT_CODE != '0'
        run: exit "$DRIFT_EXIT_CODE"

      # PRコメントが必要な場合は、pull_request権限を設計したうえで
      # `gh api repos/$GITHUB_REPOSITORY/issues/<PR>/comments` を追加してください。
